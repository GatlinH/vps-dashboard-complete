<!-- frontend/offline.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS 星图 - 离线</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: white;
            border-radius: 16px;
            padding: 40px 20px;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        p {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .features {
            text-align: left;
            margin: 30px 0;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
        }

        .features h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .features ul {
            list-style: none;
        }

        .features li {
            color: #666;
            padding: 5px 0;
            padding-left: 25px;
            position: relative;
        }

        .features li:before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #4CAF50;
            font-weight: bold;
        }

        .actions {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .status {
            margin-top: 30px;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }

        .status.offline {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef5350;
        }

        .status.online {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #66bb6a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>网络已离线</h1>
        <p>您当前处于离线状态，但 VPS 星图仍可以工作！</p>

        <div class="features">
            <h3>离线功能：</h3>
            <ul>
                <li>查看已缓存的服务器信息</li>
                <li>浏览历史记录和数据</li>
                <li>操作会自动同步</li>
                <li>离线时的所有操作都会保存</li>
            </ul>
        </div>

        <div class="actions">
            <button class="btn-primary" onclick="goHome()">返回主页</button>
            <button class="btn-secondary" onclick="location.reload()">刷新页面</button>
        </div>

        <div class="status offline" id="status">
            <span id="statusText">⚠️ 当前离线</span>
            <span id="retryTime"></span>
        </div>
    </div>

    <script>
        // 定期检查网络状态
        function checkNetworkStatus() {
            if (navigator.onLine) {
                document.getElementById('status').className = 'status online';
                document.getElementById('statusText').textContent = '✓ 网络已恢复';
                
                // 自动重新加载
                setTimeout(() => {
                    location.href = '/';
                }, 2000);
            } else {
                document.getElementById('status').className = 'status offline';
                document.getElementById('statusText').textContent = '⚠️ 当前离线';
            }
        }

        function goHome() {
            // 尝试离线访问缓存
            fetch('/')
                .then(response => {
                    if (response.ok) {
                        location.href = '/';
                    }
                })
                .catch(() => {
                    alert('网络仍然不可用，请检查连接后重试');
                });
        }

        // 监听网络状态变化
        window.addEventListener('online', checkNetworkStatus);
        window.addEventListener('offline', checkNetworkStatus);

        // 初始检查
        checkNetworkStatus();

        // 每 5 秒检查一次
        setInterval(checkNetworkStatus, 5000);
    </script>
</body>
</html>
