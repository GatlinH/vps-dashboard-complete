// ===== TRAFFIC STATISTICS =====

let trafficActiveGroup = '全部';
let trafficChartBar   = null;
let trafficChartTrend = null;

// ── Helpers ───────────────────────────────────────────────────────────────
function fmtGb(v) {
  v = Number(v) || 0;
  if (v >= 1024) return (v / 1024).toFixed(2) + ' TB';
  return v.toFixed(1) + ' GB';
}

function getTrafficPct(s) {
  if (!s.traffic_limit_gb || s.traffic_limit_gb <= 0) return null;
  const used = s.traffic_used_gb || ((s.traffic_up_gb || 0) + (s.traffic_down_gb || 0));
  return Math.min(100, (used / s.traffic_limit_gb) * 100);
}

function getTrafficUsed(s) {
  return s.traffic_used_gb || ((s.traffic_up_gb || 0) + (s.traffic_down_gb || 0));
}

function trafficColorForPct(pct, threshold) {
  if (pct === null) return 'var(--accent)';
  if (pct >= 95)        return 'var(--red)';
  if (pct >= threshold) return 'var(--orange)';
  return 'var(--green)';
}

function daysUntilReset(resetDay) {
  const now   = new Date();
  const next  = new Date(now.getFullYear(), now.getMonth(), resetDay);
  if (next <= now) next.setMonth(next.getMonth() + 1);
  return Math.ceil((next - now) / 86400000);
}

// ── Filter servers for traffic page ───────────────────────────────────────
function getTrafficServers() {
  if (trafficActiveGroup === '全部') return servers;
  return servers.filter(s => s.group === trafficActiveGroup);
}

// ── Summary stats bar ─────────────────────────────────────────────────────
function renderTrafficStats() {
  const list      = getTrafficServers();
  const threshold = parseInt(document.getElementById('trafficAlertThreshold')?.value || 80);
  const withLimit = list.filter(s => s.traffic_limit_gb > 0);
  const critCount = withLimit.filter(s => (getTrafficPct(s) || 0) >= 95).length;
  const warnCount = withLimit.filter(s => {
    const p = getTrafficPct(s) || 0; return p >= threshold && p < 95;
  }).length;

  const totalUp   = list.reduce((a, s) => a + (s.traffic_up_gb   || 0), 0);
  const totalDown = list.reduce((a, s) => a + (s.traffic_down_gb  || 0), 0);
  const totalUsed = list.reduce((a, s) => a + getTrafficUsed(s),         0);

  document.getElementById('trafficStatsBar').innerHTML = `
    <div class="stat-card blue">
      <div class="stat-label">总出站流量</div>
      <div class="stat-val" style="font-size:18px;color:var(--accent)">${fmtGb(totalUp)}</div>
      <div class="stat-sub">${list.length} 台服务器</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">总入站流量</div>
      <div class="stat-val" style="font-size:18px;color:var(--accent)">${fmtGb(totalDown)}</div>
      <div class="stat-sub">出入合计 ${fmtGb(totalUsed)}</div>
    </div>
    <div class="stat-card ${critCount > 0 ? 'red' : warnCount > 0 ? 'gold' : 'green'}">
      <div class="stat-label">流量预警</div>
      <div class="stat-val ${critCount > 0 ? 'red' : warnCount > 0 ? 'gold' : 'green'}">${critCount + warnCount} 台</div>
      <div class="stat-sub">危急 ${critCount} · 预警 ${warnCount}</div>
    </div>
    <div class="stat-card purple">
      <div class="stat-label">有流量限制</div>
      <div class="stat-val" style="color:var(--purple)">${withLimit.length} 台</div>
      <div class="stat-sub">无限制 ${list.length - withLimit.length} 台</div>
    </div>
  `;
}

// ── Alert banner ──────────────────────────────────────────────────────────
function renderTrafficAlertBanner() {
  const threshold = parseInt(document.getElementById('trafficAlertThreshold')?.value || 80);
  const crits = getTrafficServers().filter(s => (getTrafficPct(s) || 0) >= 95);
  const warns = getTrafficServers().filter(s => {
    const p = getTrafficPct(s) || 0; return p >= threshold && p < 95;
  });
  const el = document.getElementById('trafficAlertBanner');
  if (!crits.length && !warns.length) { el.innerHTML = ''; return; }

  const items = [
    ...crits.map(s => `<li>${s.flag} <b>${s.name}</b> — 已用 ${getTrafficPct(s).toFixed(1)}%，剩余仅 ${fmtGb(s.traffic_limit_gb - getTrafficUsed(s))}（危急）</li>`),
    ...warns.map(s => `<li class="warn">${s.flag} <b>${s.name}</b> — 已用 ${getTrafficPct(s).toFixed(1)}%（预警）</li>`),
  ].join('');

  el.innerHTML = `
    <div class="traffic-alert-banner ${crits.length ? '' : 'warn'}">
      <div class="traffic-alert-icon">${crits.length ? '🔴' : '⚡'}</div>
      <div>
        <div style="font-weight:700;color:${crits.length ? 'var(--red)' : 'var(--orange)'};margin-bottom:4px">
          ${crits.length ? `${crits.length} 台服务器流量危急（≥95%）` : `${warns.length} 台服务器流量预警（≥${threshold}%）`}
        </div>
        <ul class="traffic-alert-list">${items}</ul>
      </div>
    </div>`;
}

// ── Traffic card for each server ──────────────────────────────────────────
function renderTrafficCard(s) {
  const threshold = parseInt(document.getElementById('trafficAlertThreshold')?.value || 80);
  const pct       = getTrafficPct(s);
  const used      = getTrafficUsed(s);
  const hasLimit  = s.traffic_limit_gb > 0;
  const isCrit    = hasLimit && pct >= 95;
  const isWarn    = hasLimit && pct >= threshold && !isCrit;
  const barColor  = isCrit ? '#ff6b6b' : isWarn ? '#ff9f43' : '#63b3ed';
  const cardCls   = isCrit ? 'crit' : isWarn ? 'warn' : '';
  const resetIn   = daysUntilReset(s.traffic_reset_day || 1);
  const upGb      = s.traffic_up_gb   || 0;
  const downGb    = s.traffic_down_gb || 0;
  const remaining = hasLimit ? Math.max(0, s.traffic_limit_gb - used) : null;

  return `<div class="traffic-card ${cardCls}" onclick="openDetail(${s.id})" style="cursor:pointer">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
      <div>
        <div style="font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px">
          <span>${s.flag}</span> ${s.name}
          ${isCrit ? '<span class="badge badge-red" style="font-size:10px">危急</span>' : isWarn ? '<span class="badge" style="background:rgba(255,159,67,.12);color:var(--orange);border:1px solid rgba(255,159,67,.3);font-size:10px">预警</span>' : ''}
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)">${s.location} · ${s.ip}</div>
      </div>
      <div style="text-align:right">
        <div class="traffic-reset-badge">重置 ${resetIn}天后</div>
        <div style="font-size:10px;color:var(--text3);margin-top:4px">每月 ${s.traffic_reset_day || 1} 日</div>
      </div>
    </div>

    ${hasLimit ? `
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
      <span style="color:${barColor};font-weight:700">${pct.toFixed(1)}% 已用</span>
      <span style="color:var(--text3)">${fmtGb(used)} / ${fmtGb(s.traffic_limit_gb)}</span>
    </div>
    <div class="traffic-bar-wrap">
      <div class="traffic-bar-fill" style="width:${pct}%;background:${barColor}"></div>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-top:4px;text-align:right">
      剩余 <span style="color:${isCrit?'var(--red)':isWarn?'var(--orange)':'var(--green)';font-weight:700">${fmtGb(remaining)}</span>
    </div>` : `
    <div style="display:flex;align-items:center;gap:6px;margin:8px 0">
      <div class="traffic-bar-wrap" style="flex:1">
        <div class="traffic-bar-fill" style="width:100%;background:rgba(99,179,237,.3)"></div>
      </div>
      <span style="font-size:11px;color:var(--text3);white-space:nowrap">不限流量</span>
    </div>`}

    <div class="traffic-numbers">
      <div class="traffic-num-item">
        <div class="traffic-num-label">↑ 出站</div>
        <div class="traffic-num-val" style="color:var(--accent)">${fmtGb(upGb)}</div>
      </div>
      <div class="traffic-num-item">
        <div class="traffic-num-label">↓ 入站</div>
        <div class="traffic-num-val" style="color:var(--purple)">${fmtGb(downGb)}</div>
      </div>
      <div class="traffic-num-item">
        <div class="traffic-num-label">实时速率</div>
        <div class="traffic-num-val" style="color:var(--green);font-size:12px">
          ↑${Number(s.net_up).toFixed(1)}<br>↓${Number(s.net_down).toFixed(1)} MB/s
        </div>
      </div>
    </div>
  </div>`;
}

// ── Traffic cards grid ────────────────────────────────────────────────────
function renderTrafficGrid() {
  const list = getTrafficServers();
  // Sort: crit first → warn → ok → no-limit
  const threshold = parseInt(document.getElementById('trafficAlertThreshold')?.value || 80);
  const sorted = [...list].sort((a, b) => {
    const pa = getTrafficPct(a) || 0, pb = getTrafficPct(b) || 0;
    if (pa >= 95 && pb < 95) return -1;
    if (pb >= 95 && pa < 95) return 1;
    if (pa >= threshold && pb < threshold) return -1;
    if (pb >= threshold && pa < threshold) return 1;
    return pb - pa;
  });
  document.getElementById('trafficGrid').innerHTML = sorted.map(renderTrafficCard).join('');
}

// ── Group tabs ────────────────────────────────────────────────────────────
function renderTrafficGroupTabs() {
  const groups = ['全部', ...new Set(servers.map(s => s.group))];
  document.getElementById('trafficGroupTabs').innerHTML = groups.map(g =>
    `<button class="group-tab ${g === trafficActiveGroup ? 'active' : ''}"
      onclick="trafficActiveGroup='${g}';renderTrafficPage()">${g}</button>`
  ).join('');
}

// ── Bar chart (Chart.js) ──────────────────────────────────────────────────
function renderTrafficBarChart() {
  const list   = getTrafficServers();
  const labels = list.map(s => s.name);
  const upData = list.map(s => parseFloat((s.traffic_up_gb   || 0).toFixed(1)));
  const dnData = list.map(s => parseFloat((s.traffic_down_gb || 0).toFixed(1)));

  if (trafficChartBar) { trafficChartBar.destroy(); trafficChartBar = null; }

  const ctx = document.getElementById('trafficBarChart');
  if (!ctx || typeof Chart === 'undefined') return;

  trafficChartBar = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '↑ 出站 (GB)', data: upData,  backgroundColor: 'rgba(99,179,237,0.75)', borderRadius: 4 },
        { label: '↓ 入站 (GB)', data: dnData, backgroundColor: 'rgba(167,139,250,0.75)', borderRadius: 4 },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { color: '#94a3b8', font: { size: 11 } } } },
      scales: {
        x: { stacked: false, ticks: { color: '#64748b', font: { size: 10 }, maxRotation: 30 }, grid: { color: 'rgba(255,255,255,.04)' } },
        y: { ticks: { color: '#64748b', font: { size: 11 }, callback: v => v + ' GB' }, grid: { color: 'rgba(255,255,255,.06)' } },
      },
    },
  });
}

// ── Trend chart ───────────────────────────────────────────────────────────
function populateTrendSelect() {
  const sel = document.getElementById('trafficTrendServer');
  if (!sel) return;
  sel.innerHTML = servers.map(s => `<option value="${s.id}">${s.flag} ${s.name}</option>`).join('');
}

function renderTrafficTrend() {
  const sel = document.getElementById('trafficTrendServer');
  const sid = parseInt(sel?.value);
  const s   = servers.find(x => x.id === sid);
  if (!s) return;

  // Generate simulated 30-day history
  const days   = 30;
  const labels = [];
  const upArr  = [], dnArr = [];
  const baseUp = (s.traffic_up_gb   || 10) / 30;
  const baseDn = (s.traffic_down_gb || 50) / 30;
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    labels.push(`${d.getMonth()+1}/${d.getDate()}`);
    upArr.push(parseFloat((baseUp * (0.6 + Math.random() * 0.8)).toFixed(2)));
    dnArr.push(parseFloat((baseDn * (0.6 + Math.random() * 0.8)).toFixed(2)));
  }

  if (trafficChartTrend) { trafficChartTrend.destroy(); trafficChartTrend = null; }

  const ctx = document.getElementById('trafficTrendChart');
  if (!ctx || typeof Chart === 'undefined') return;

  trafficChartTrend = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '出站 (GB)', data: upArr, borderColor: '#63b3ed', backgroundColor: 'rgba(99,179,237,.1)', borderWidth: 1.5, pointRadius: 0, tension: 0.4, fill: true },
        { label: '入站 (GB)', data: dnArr, borderColor: '#a78bfa', backgroundColor: 'rgba(167,139,250,.1)', borderWidth: 1.5, pointRadius: 0, tension: 0.4, fill: true },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { color: '#94a3b8', font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#64748b', font: { size: 10 }, maxTicksLimit: 10 }, grid: { color: 'rgba(255,255,255,.04)' } },
        y: { ticks: { color: '#64748b', font: { size: 11 }, callback: v => v + ' GB' }, grid: { color: 'rgba(255,255,255,.06)' } },
      },
    },
  });
}

// ── Detail table ──────────────────────────────────────────────────────────
function renderTrafficTable() {
  const list      = getTrafficServers();
  const threshold = parseInt(document.getElementById('trafficAlertThreshold')?.value || 80);

  const rows = list.map(s => {
    const pct   = getTrafficPct(s);
    const used  = getTrafficUsed(s);
    const color = pct === null ? 'var(--text3)' : pct >= 95 ? 'var(--red)' : pct >= threshold ? 'var(--orange)' : 'var(--green)';
    const pctStr = pct === null ? '不限' : `${pct.toFixed(1)}%`;
    const remaining = s.traffic_limit_gb > 0 ? fmtGb(Math.max(0, s.traffic_limit_gb - used)) : '∞';
    return `<tr class="traffic-table-row">
      <td><span style="font-size:16px">${s.flag}</span></td>
      <td style="color:var(--text);font-weight:600">${s.name}</td>
      <td style="color:var(--text3);font-size:12px">${s.location}</td>
      <td style="font-family:var(--mono);font-size:12px;color:var(--accent)">${fmtGb(s.traffic_up_gb||0)}</td>
      <td style="font-family:var(--mono);font-size:12px;color:var(--purple)">${fmtGb(s.traffic_down_gb||0)}</td>
      <td style="font-family:var(--mono);font-size:12px">${fmtGb(used)}</td>
      <td style="font-family:var(--mono);font-size:12px;color:var(--text3)">${s.traffic_limit_gb > 0 ? fmtGb(s.traffic_limit_gb) : '不限'}</td>
      <td style="font-family:var(--mono);font-size:13px;font-weight:700;color:${color}">${pctStr}</td>
      <td style="font-family:var(--mono);font-size:12px;color:var(--green)">${remaining}</td>
      <td><span class="traffic-reset-badge">${daysUntilReset(s.traffic_reset_day||1)}天后</span></td>
    </tr>`;
  }).join('');

  document.getElementById('trafficTable').innerHTML = `
    <thead>
      <tr style="border-bottom:2px solid var(--border)">
        ${['','服务器','位置','↑ 出站','↓ 入站','已用','限额','使用率','剩余','重置'].map(h =>
          `<th style="padding:8px 10px;text-align:left;font-size:11px;color:var(--text3);letter-spacing:.5px;font-weight:400;white-space:nowrap">${h}</th>`
        ).join('')}
      </tr>
    </thead>
    <tbody>${rows}</tbody>`;
}

// ── Traffic settings modal ────────────────────────────────────────────────
function openTrafficSettings() {
  const body = document.getElementById('trafficSettingsBody');
  body.innerHTML = `
    <div style="font-size:12px;color:var(--text3);margin-bottom:14px">
      为每台服务器设置月流量限额和重置日。限额为 0 表示不限流量。
    </div>
    ${servers.map(s => `
    <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:18px;flex-shrink:0">${s.flag}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;color:var(--text)">${s.name}</div>
        <div style="font-size:11px;color:var(--text3)">${s.location}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <label style="font-size:11px;color:var(--text3)">限额(GB)</label>
        <input id="tl-limit-${s.id}" type="number" class="form-input"
          value="${s.traffic_limit_gb||0}" style="width:80px;padding:5px 8px;font-size:12px" min="0">
        <label style="font-size:11px;color:var(--text3)">重置日</label>
        <input id="tl-day-${s.id}" type="number" class="form-input"
          value="${s.traffic_reset_day||1}" style="width:56px;padding:5px 8px;font-size:12px" min="1" max="28">
      </div>
    </div>`).join('')}
    <div style="display:flex;gap:10px;margin-top:1.25rem">
      <button class="add-btn" onclick="saveTrafficSettings()">保存配置</button>
      <button onclick="document.getElementById('trafficSettingsModal').classList.remove('open')"
        style="padding:8px 18px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:13px">取消</button>
    </div>
    <div id="trafficSettingsMsg" style="margin-top:8px;font-size:12px;min-height:18px"></div>`;

  document.getElementById('trafficSettingsModal').classList.add('open');
}

function saveTrafficSettings() {
  servers.forEach(s => {
    const limEl = document.getElementById(`tl-limit-${s.id}`);
    const dayEl = document.getElementById(`tl-day-${s.id}`);
    if (limEl) s.traffic_limit_gb  = parseFloat(limEl.value) || 0;
    if (dayEl) s.traffic_reset_day = parseInt(dayEl.value) || 1;
  });
  localStorage.setItem('vps_servers', JSON.stringify(servers));
  showMsg('trafficSettingsMsg', '✅ 流量配置已保存', 'green');
  setTimeout(() => {
    document.getElementById('trafficSettingsModal').classList.remove('open');
    renderTrafficPage();
  }, 800);
}

// ── Main render orchestrator ──────────────────────────────────────────────
function renderTrafficPage() {
  renderTrafficGroupTabs();
  renderTrafficStats();
  renderTrafficAlertBanner();
  renderTrafficGrid();
  // Charts need Chart.js loaded — load lazily
  if (typeof Chart === 'undefined') {
    const scr = document.createElement('script');
    scr.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js';
    scr.onload = () => {
      renderTrafficBarChart();
      populateTrendSelect();
      renderTrafficTrend();
    };
    document.head.appendChild(scr);
  } else {
    renderTrafficBarChart();
    populateTrendSelect();
    renderTrafficTrend();
  }
  renderTrafficTable();
}

// ── Simulate periodic traffic accumulation ────────────────────────────────
setInterval(() => {
  servers.forEach(s => {
    if (s.status === 'offline') return;
    const addUp = (s.net_up   || 0) * 3 / 1024;  // MB/s × 3s → GB
    const addDn = (s.net_down || 0) * 3 / 1024;
    s.traffic_up_gb   = parseFloat(((s.traffic_up_gb   || 0) + addUp).toFixed(4));
    s.traffic_down_gb = parseFloat(((s.traffic_down_gb || 0) + addDn).toFixed(4));
    if (s.traffic_limit_gb > 0) {
      s.traffic_used_gb = s.traffic_up_gb + s.traffic_down_gb;
    }
  });
  // Refresh traffic page if active
  if (document.getElementById('page-traffic')?.classList.contains('active')) {
    renderTrafficStats();
    renderTrafficAlertBanner();
    renderTrafficGrid();
    renderTrafficTable();
  }
}, 3000);
</script>

<script type="module">
    import app from './app.js';

    // 等待应用初始化
    app.eventBus.on('appReady', async () => {
        console.log('✓ 应用已准备好');
        
        // 立即加载服务器列表
        try {
            await app.loadServers();
            initDashboard();  // 现有的初始化函数
        } catch (error) {
            console.error('初始化失败:', error);
        }

    // 登录成功后启动实时更新
    app.eventBus.on('loginSuccess', () => {
        app.startMetricsPolling(15000);  // 15 秒更新一次
    });

    // 登出时停止更新
    app.eventBus.on('logoutSuccess', () => {
        app.stopMetricsPolling();
    });

    // 监听错误事件
    app.eventBus.on('error', (error) => {
        console.error('应用错误:', error.message);
        // 可以显示到 UI
    });

    // 暴露全局函数供 HTML 调用
    window.appLogin = async (username, password) => {
        try {
            await app.login(username, password);
            showNotification('登录成功！');
        } catch (error) {
            showNotification('登录失败: ' + error.message, 'error');
        }
    };

    window.appLogout = () => {
        app.logout();

<!-- ===== 模块初始化脚本 ===== -->
<script type="module">
    import app from './app.js';
    import { ChartManager } from './charts.js';
    import { PerformanceOptimizer } from './performance.js';
    import { Logger } from './logger.js';

    // ===== 初始化模块 =====
    const chartManager = new ChartManager(app);
    const perfOptimizer = new PerformanceOptimizer(app);
    const logger = new Logger('info');
    
    // 暴露到全局作用域（便于调试）
    window.logger = logger;
    window.app = app;
    window.chartManager = chartManager;
    window.perfOptimizer = perfOptimizer;

    logger.info('📦 模块初始化开始');

    // ===== 应用就绪事件 =====
    app.eventBus.on('appReady', async () => {
        logger.info('🚀 应用初始化开始');
        
        try {
            // 1. 加载服务器列表
            await app.loadServers();
            logger.info('✓ 服务器列表已加载', { count: app.store.state.servers.length });
            
            // 2. 初始化图表（延迟 300ms，确保 DOM 准备就绪）
            setTimeout(() => {
                const servers = app.store.state.servers;
                if (servers.length > 0) {
                    logger.info('📊 初始化图表...');
                    try {
                        chartManager.createCPUChart('cpuChart', servers[0]);
                        logger.info('✓ CPU 趋势图已创建');
                    } catch (e) {
                        logger.warn('CPU 趋势图初始化失败', e);
                    }
                    
                    try {
                        chartManager.createTrafficChart('trafficChart', servers);
                        logger.info('✓ 流量统计图已创建');
                    } catch (e) {
                        logger.warn('流量统计图初始化失败', e);
                    }
                    
                    try {
                        chartManager.createCostTrendChart('costTrendChart', servers);
                        logger.info('✓ 成本趋势图已创建');
                    } catch (e) {
                        logger.warn('成本趋势图初始化失败', e);
                    }
                } else {
                    logger.warn('⚠️ 没有可用的服务器数据');
                }
            }, 300);
            
            // 3. 启用性能优化
            perfOptimizer.enableRequestDeduplication(app.api);
            logger.info('✓ 请求去重已启用');
            
            // 4. 启用惰性加载（可选，取决于 HTML 中是否有 data-lazy 属性）
            const lazyCharts = document.querySelectorAll('canvas[data-lazy]');
            if (lazyCharts.length > 0) {
                perfOptimizer.enableLazyChartLoading(chartManager);
                logger.info('✓ 图表惰性加载已启用', { count: lazyCharts.length });
            }
            
        } catch (error) {
            logger.error('❌ 应用初始化失败', error);
        }
    });

    // ===== 登录成功事件 =====
    app.eventBus.on('loginSuccess', (user) => {
        logger.info('👤 用户已登录', { username: user.username });
        
        // 启动实时轮询
        app.startMetricsPolling(15000);
        logger.info('✓ 实时轮询已启动 (15s 间隔)');
    });

    // ===== 指标更新事件 =====
    app.eventBus.on('metricsUpdated', (metrics) => {
        logger.debug('🔄 指标已更新', { count: metrics.size });
        
        // 可以在这里刷新图表等操作
        try {
            const servers = app.store.state.servers;
            if (servers.length > 0 && window.chartManager) {
                // 更新流量图表
                window.chartManager.destroyChart('trafficChart');
                window.chartManager.createTrafficChart('trafficChart', servers);
            }
        } catch (e) {
            logger.warn('图表更新失败', e);
        }
    });

    // ===== 登出事件 =====
    app.eventBus.on('logoutSuccess', () => {
        logger.info('👋 用户已登出');
        app.stopMetricsPolling();
        chartManager.destroyAll();
    });

    // ===== 错误处理 =====
    app.eventBus.on('error', (errorObj) => {
        logger.error('⚠️ 应用错误', errorObj);
    });

    // ===== 性能监测（可选） =====
    if (window.performance) {
        window.addEventListener('load', () => {
            logger.info('📈 页面加载完成，性能指标：');
            perfOptimizer.recordMetrics();
        });
    }

    logger.info('✓ 所有模块初始化完成！');
</script>
</body>
</html>
