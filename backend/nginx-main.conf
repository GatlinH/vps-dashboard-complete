# VPS 星图 · Nginx 主配置（nginx-main.conf）
# 路径（容器内）：/etc/nginx/nginx.conf
#
# P3F：limit_req_zone 收敛配置
# ─────────────────────────────────────────────────────────────────────────────
# 此文件通过 docker-compose.yml volume 挂载替换容器内默认 /etc/nginx/nginx.conf，
# 将 limit_req_zone 放置在 http {} 块（唯一合法位置），确保：
#   1. 容器启动即自动生效，无需手工编辑宿主 nginx 主配置
#   2. dev / staging / prod 使用同一套配置入口（速率值可通过注释说明调整）
#   3. nginx -t 配置检验可直接通过
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── 访问日志格式（包含限流命中字段） ─────────────────────────────────────
    # $limit_req_status 在请求被限流（REJECTED/DELAYED）时会有值，
    # 可通过 grep "REJECTED\|DELAYED" /var/log/nginx/access.log 快速识别限流命中。
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'limit_req=$limit_req_status';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    server_tokens   off;

    # ── 限流区域定义（http 级别，全局共享） ──────────────────────────────────
    #
    # 区域说明：
    #   api:10m   — 通用 API 限流，按客户端 IP；10 MB 约可追踪 80 000 个 IP
    #               默认速率：30 req/s（约 1 800 rpm）
    #               对应 location /api/ 的 burst=30 nodelay
    #
    #   login:10m — 登录接口严格限流，防暴力破解
    #               默认速率：5 req/min（约 0.083 req/s）
    #               对应 location = /api/v1/auth/login 的 burst=5 nodelay
    #
    # 调参说明（不同环境需求）：
    #   开发/测试  → 可临时调高速率（如 api 改 300r/s）避免开发期频繁触发限流
    #   生产保守   → 可适当降低（如 api 改 10r/s），结合后端 flask-limiter 双层防护
    #
    # $binary_remote_addr 比 $remote_addr 节省内存（固定 4 字节 vs 可变字符串）。
    # 如部署在 LB/CDN 之后，请先在 server 块配置 set_real_ip_from / real_ip_header，
    # 确保 $binary_remote_addr 取到真实客户端 IP，否则所有请求均共享代理 IP 的限额。
    #
    limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # 被限流请求的日志级别（warn 级别将出现在 error.log，便于监控告警接入）
    limit_req_log_level warn;

    # ── 站点配置（保持原有 conf.d include 模式不变） ────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
