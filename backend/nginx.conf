# VPS 星图 · Nginx 配置
# 路径：/etc/nginx/conf.d/default.conf

# ── Nginx 层限流配置说明 ──────────────────────────────────────────────────────
# 以下 limit_req_zone 指令需在 Nginx 主配置的 http {} 块中添加，
# 通常位于 /etc/nginx/nginx.conf，或通过 nginx.conf 主配置的 include 引入：
#
#   limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/s;
#   limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
#
# 若使用 docker-compose 且 nginx 服务使用本文件作为 default.conf，
# 请在 docker-compose 的 nginx 服务 command 或自定义 nginx.conf 中添加上述两行。
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name your-domain.com;

    # HTTP → HTTPS 强制跳转（启用 HTTPS 后取消此注释，并删除下方 HTTP 功能块）
    # return 301 https://$host$request_uri;

    # 前端静态文件根目录（挂载 Vite 构建产物 frontend-dist/）
    root  /usr/share/nginx/html;
    index index.html;   # ← Vite 构建入口，原 public.html 已迁移至 index.html

    # ── 预压缩文件支持（Vite 构建后由 precompress-assets 插件生成） ─────────
    # gzip_static on：优先 serve assets/*.gz，无需实时压缩
    # 需要 nginx 内置 ngx_http_gzip_static_module（nginx:alpine 已包含）
    gzip_static on;

    # brotli_static on：优先 serve assets/*.br
    # ⚠️  需要 fholzer/nginx-brotli 镜像（原 nginx:alpine 不含 ngx_brotli 模块）
    # docker-compose.yml 中 nginx image 已更改为 fholzer/nginx-brotli:latest
    brotli_static on;

    # ── 基础安全响应头 ────────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                              always;
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header X-XSS-Protection          "1; mode=block"                     always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net fonts.googleapis.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com fonts.gstatic.com; font-src 'self' fonts.gstatic.com fonts.googleapis.com data:; img-src 'self' data: https:; connect-src 'self' ip-api.com ipapi.co; frame-ancestors 'none';" always;

    # ── Vite 构建产物：带 hash 的 JS/CSS 长效缓存（1 年）────────────────────
    # 文件名含 content-hash，内容变化则 hash 变化，可安全设置 immutable
    location ~* ^/assets/.*-[a-f0-9]+\.(js|css|woff2?)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }

    # ── Service Worker：强制不缓存（保证更新及时生效）───────────────────────
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── PWA manifest：1 小时短缓存 ──────────────────────────────────────────
    location = /manifest.webmanifest {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── 前台入口（Vite 构建后为 index.html）──────────────────────────────────
    location = / {
        try_files $uri /index.html;
    }

    # 兼容旧路径：/public.html → /index.html（前端迁移过渡期，可在确认无外链后移除）
    location = /public.html {
        return 301 /index.html;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri /index.html;
    }

    # ── 管理后台入口（建议仅内网或白名单 IP 访问） ────────────────────────────
    # 如需 IP 白名单，取消下面两行注释并填入管理员 IP：
    # allow YOUR_ADMIN_IP;
    # deny all;
    location = /admin.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri /admin.html;
    }

    # 兼容 /admin 路径（不带 .html 后缀）
    location = /admin {
        return 302 /admin.html;
    }

    # ── 一般静态资源（SPA 路由回落）──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Flask API 代理 ────────────────────────────────────────────────────────
    # 旧路径向后兼容重定向（添加于 2026-04-10，180 天后（2026-10-07）可移除）
    location ~ ^/api/(?!v\d+/)(.+)$ {
        return 301 /api/v1/$1$is_args$args;
    }

    # ── 登录接口：单独严格限流，防暴力破解 ──────────────────────────────────
    location = /api/v1/auth/login {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;
        proxy_pass            http://api:5000;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    30s;
        proxy_connect_timeout 10s;
        add_header Cache-Control "no-store" always;
    }

    location /api/ {
        limit_req zone=api burst=30 nodelay;
        limit_req_status 429;
        proxy_pass            http://api:5000;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        add_header Cache-Control "no-store" always;
    }

    # ── 地图瓦片（更长缓存，公开静态资源） ──────────────────────────────────
    location /api/geo/tile/ {
        proxy_pass        http://api:5000;
        proxy_cache_valid 200 24h;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── 压缩 ─────────────────────────────────────────────────────────────────
    # 动态 gzip：处理未预压缩的响应（HTML、API 返回的 JSON 等）
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types      text/plain application/json application/javascript
                    text/css image/svg+xml application/manifest+json;

    # 动态 brotli 兜底（需 fholzer/nginx-brotli 镜像）
    brotli            on;
    brotli_comp_level 4;
    brotli_types      text/plain application/json application/javascript
                      text/css image/svg+xml application/manifest+json;
}

# ── HTTPS 配置（取消注释并填入证书路径后生效） ──────────────────────────────────
# 启用步骤：
#   1. 申请证书（推荐 Let's Encrypt: certbot --nginx -d your-domain.com）
#   2. 将下方 server_name 和证书路径替换为实际值
#   3. 取消整块注释
#   4. 将上方 HTTP server 块中的功能配置替换为 "return 301 https://$host$request_uri;"
#
# server {
#     listen 443 ssl http2;
#     server_name your-domain.com;
#
#     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5;
#     ssl_session_cache   shared:SSL:10m;
#     ssl_session_timeout 10m;
#
#     # HSTS：告知浏览器后续 1 年内强制使用 HTTPS
#     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
#
#     # （将上方 HTTP server 块中的其余 location / add_header / gzip 配置复制到此处）
# }
