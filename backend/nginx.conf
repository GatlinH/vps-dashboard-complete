# VPS 星图 · Nginx 站点配置
# 路径（容器内）：/etc/nginx/conf.d/default.conf
#
# P3F：limit_req_zone 已移至 backend/nginx-main.conf 的 http {} 块，
# 通过 docker-compose.yml volume 挂载自动加载，无需手工添加。
# 本文件中的 limit_req 指令直接引用 nginx-main.conf 中定义的 zone 名称。

server {
    resolver 127.0.0.11 valid=10s;
    set $upstream_api "api:5000";
    listen 80;
    server_name your-domain.com;

    # HTTP → HTTPS 强制跳转（启用 HTTPS 后取消此注释，并删除下方 HTTP 功能块）
    # return 301 https://$host$request_uri;

    # ── 真实客户端 IP（如部署在 LB / CDN 之后请配置此节） ─────────────────────
    # 拓扑假设：
    #   A) 直连部署（无代理层）：$remote_addr 即为真实客户端 IP，下方无需修改。
    #   B) 在 LB / 反向代理之后：取消注释，将 set_real_ip_from 替换为实际上游网段。
    #   C) 在 Cloudflare 之后：set_real_ip_from 使用 Cloudflare 公布的 IP 段，
    #      real_ip_header 改为 CF-Connecting-IP。
    #
    # set_real_ip_from 10.0.0.0/8;        # 信任的上游 LB 网段（按实际调整）
    # set_real_ip_from 172.16.0.0/12;     # Docker 默认网段（LB 与 nginx 同 Compose 时）
    # set_real_ip_from 192.168.0.0/16;    # 私有网段
    # real_ip_header   X-Forwarded-For;   # 或 X-Real-IP / CF-Connecting-IP（Cloudflare）
    # real_ip_recursive on;               # 链式代理时逐级剥去可信代理 IP
    #
    # ⚠️  切勿使用 set_real_ip_from 0.0.0.0/0，否则任何人均可伪造
    #     X-Forwarded-For 绕过下方管理路由白名单。
    # ─────────────────────────────────────────────────────────────────────────

    # 前端静态文件根目录（挂载 Vite 构建产物 frontend-dist/）
    root  /usr/share/nginx/html;
    index index.html;   # ← Vite 构建入口，原 public.html 已迁移至 index.html

    # ── 预压缩文件支持（Vite 构建后由 precompress-assets 插件生成） ─────────
    # gzip_static on：优先 serve assets/*.gz，无需实时压缩
    # 需要 nginx 内置 ngx_http_gzip_static_module（nginx:alpine 已包含）
    gzip_static on;

    # brotli_static on：优先 serve assets/*.br
    # ⚠️  需要 fholzer/nginx-brotli 镜像（原 nginx:alpine 不含 ngx_brotli 模块）
    # docker-compose.yml 中 nginx image 已更改为 fholzer/nginx-brotli:latest
    brotli_static off;

    # ── 基础安全响应头 ────────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                              always;
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header X-XSS-Protection          "1; mode=block"                     always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net fonts.googleapis.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com fonts.gstatic.com; font-src 'self' fonts.gstatic.com fonts.googleapis.com data:; img-src 'self' data: https:; connect-src 'self' ip-api.com ipapi.co https://services.arcgisonline.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Vite 构建产物：带 hash 的 JS/CSS 长效缓存（1 年）────────────────────
    # 文件名含 content-hash，内容变化则 hash 变化，可安全设置 immutable
    location ~* ^/assets/.*-[a-f0-9]+\.(js|css|woff2?)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }

    # ── Service Worker：强制不缓存（保证更新及时生效）───────────────────────
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── PWA manifest：1 小时短缓存 ──────────────────────────────────────────
    location = /manifest.webmanifest {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── 前台入口（Vite 构建后为 index.html）──────────────────────────────────
    location = / {
        try_files $uri /index.html;
    }

    # 兼容旧路径：/public.html → /index.html（前端迁移过渡期，可在确认无外链后移除）
    location = /public.html {
        return 301 /index.html;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri /index.html;
    }

    # ── 管理后台入口（IP 白名单保护，非白名单访问返回 403） ─────────────────────
    # 白名单规则由外部文件提供，便于运维更新而无需修改本配置：
    #   文件路径（容器内）：/etc/nginx/conf.d/admin-allowlist.conf
    #   宿主机路径：backend/admin-allowlist.conf（从 admin-allowlist.conf.example 复制后修改）
    # 修改白名单后执行：nginx -t && docker compose exec nginx nginx -s reload
    location = /admin.html {
        include /etc/nginx/admin-allowlist.inc;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri /admin.html;
    }

    # 兼容 /admin 路径（不带 .html 后缀）——同样受白名单保护
    # 注意：此处用 try_files 而非 return 302，因为 return（rewrite 阶段）
    # 先于 allow/deny（access 阶段）执行，会绕过白名单检查。
    location = /admin {
        include /etc/nginx/admin-allowlist.inc;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files /admin.html =404;
    }

    # ── 一般静态资源（SPA 路由回落）──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Flask API 代理 ────────────────────────────────────────────────────────
    # 旧路径向后兼容重定向（添加于 2026-04-10，180 天后（2026-10-07）可移除）
    location ~ ^/api/(?!v\d+/)(.+)$ {
        return 301 /api/v1/$1$is_args$args;
    }

    # ── Prometheus 指标端点（仅内网访问，防止指标数据泄露）──────────────────────
    location = /metrics {
        allow 127.0.0.1;
        allow ::1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;
        proxy_pass            http://$upstream_api;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    10s;
        proxy_connect_timeout 5s;
        add_header Cache-Control "no-store" always;
    }

    # ── 登录接口：单独严格限流，防暴力破解 ──────────────────────────────────
    location = /api/v1/auth/login {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;
        proxy_pass            http://$upstream_api;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    30s;
        proxy_connect_timeout 10s;
        add_header Cache-Control "no-store" always;
    }

    location /api/ {
        limit_req zone=api burst=30 nodelay;
        limit_req_status 429;
        proxy_pass            http://$upstream_api;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        add_header Cache-Control "no-store" always;
    }

    # ── 地图瓦片（更长缓存，公开静态资源） ──────────────────────────────────
    location /api/geo/tile/ {
        proxy_pass        http://$upstream_api;
        proxy_cache_valid 200 24h;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── 压缩 ─────────────────────────────────────────────────────────────────
    # 动态 gzip：处理未预压缩的响应（HTML、API 返回的 JSON 等）
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types      text/plain application/json application/javascript
                    text/css image/svg+xml application/manifest+json;

    # 动态 brotli 兜底（需 fholzer/nginx-brotli 镜像）
    brotli            off;
    brotli_comp_level 4;
    brotli_types      text/plain application/json application/javascript
                      text/css image/svg+xml application/manifest+json;
}

# ── HTTPS 配置（取消注释并填入证书路径后生效） ──────────────────────────────────
# 启用步骤：
#   1. 申请证书（推荐 Let's Encrypt: certbot --nginx -d your-domain.com）
#   2. 将下方 server_name 和证书路径替换为实际值
#   3. 取消整块注释
#   4. 将上方 HTTP server 块中的功能配置替换为 "return 301 https://$host$request_uri;"
#
# server {
#     listen 443 ssl http2;
#     server_name your-domain.com;
#
#     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5;
#     ssl_session_cache   shared:SSL:10m;
#     ssl_session_timeout 10m;
#
#     # HSTS：告知浏览器后续 1 年内强制使用 HTTPS
#     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
#
#     # （将上方 HTTP server 块中的其余 location / add_header / gzip 配置复制到此处）
# }
