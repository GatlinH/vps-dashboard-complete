# VPS 星图 · Nginx 配置
# 路径：/etc/nginx/conf.d/default.conf

server {
    listen 80;
    server_name your-domain.com;

    # HTTP → HTTPS 强制跳转（启用 HTTPS 后取消此注释，并删除下方 HTTP 功能块）
    # return 301 https://$host$request_uri;

    # 前端静态文件根目录
    root /usr/share/nginx/html;
    index public.html;

    # ── 基础安全响应头 ────────────────────────────────────────────────────────
    # 禁止在 iframe 中嵌入，防止点击劫持
    add_header X-Frame-Options "DENY" always;
    # 禁止 MIME 类型嗅探
    add_header X-Content-Type-Options "nosniff" always;
    # 控制 Referer 信息泄露
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # XSS 保护（旧浏览器兼容）
    add_header X-XSS-Protection "1; mode=block" always;
    # 内容安全策略（保守版本，可逐步收紧）
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net fonts.googleapis.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com fonts.gstatic.com; font-src 'self' fonts.gstatic.com fonts.googleapis.com data:; img-src 'self' data: https:; connect-src 'self' ip-api.com ipapi.co; frame-ancestors 'none';" always;

    # ── 公开展示页（默认入口） ─────────────────────────────────────────────────
    location = / {
        return 302 /public.html;
    }

    location = /index.html {
        return 302 /public.html;
    }

    # 公开展示页（无需认证，可公开访问）
    location = /public.html {
        try_files $uri /public.html;
    }

    # ── 管理后台入口（建议仅内网或白名单 IP 访问） ────────────────────────────
    # 如需 IP 白名单，取消下面两行注释并填入管理员 IP：
    # allow YOUR_ADMIN_IP;
    # deny all;
    location = /admin.html {
        # 管理页面不允许被缓存
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri /admin.html;
    }

    # 兼容 /admin 路径（不带 .html 后缀）
    location = /admin {
        return 302 /admin.html;
    }

    # ── 一般静态资源 ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /public.html;
    }

    # ── Flask API 代理 ────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # API 响应不走 nginx 缓存
        add_header Cache-Control "no-store" always;
    }

    # ── 地图瓦片（更长缓存，公开静态资源） ───────────────────────────────────
    location /api/geo/tile/ {
        proxy_pass       http://api:5000;
        proxy_cache_valid 200 24h;
        add_header Cache-Control "public, max-age=86400";
        # 覆盖安全头：地图瓦片允许从 CDN 加载，其他保持
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── gzip 压缩 ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml;
    gzip_min_length 1024;
}

# ── HTTPS 配置（取消注释并填入证书路径后生效） ──────────────────────────────────
# 启用步骤：
#   1. 申请证书（推荐 Let's Encrypt: certbot --nginx -d your-domain.com）
#   2. 将下方 server_name 和证书路径替换为实际值
#   3. 取消整块注释
#   4. 将上方 HTTP server 块中的功能配置替换为 "return 301 https://$host$request_uri;"
#
# server {
#     listen 443 ssl http2;
#     server_name your-domain.com;
#
#     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5;
#     ssl_session_cache   shared:SSL:10m;
#     ssl_session_timeout 10m;
#
#     # HSTS：告知浏览器后续 1 年内强制使用 HTTPS
#     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
#
#     # （将上方 HTTP server 块中的其余 location / add_header / gzip 配置复制到此处）
# }
