# backend/docker-compose.yml - 生产优化版本

version: "3.9"

services:
  # MySQL 8
  mysql:
    image: mysql:8.0.33
    container_name: vps_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DB:-vps_dashboard}
      MYSQL_USER: ${MYSQL_USER:-vps_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-vps_pass}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max-connections=1000
      --max_allowed_packet=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - vps-network

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: vps_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      # 生产环境建议在 .env 中设置 REDIS_PASSWORD，并将上面命令替换为：
      # redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb ...
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - vps-network

  # Flask API
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 中国大陆服务器可取消注释加速安装：
        # PIP_INDEX_URL: https://pypi.tsinghua.edu.cn/simple
    container_name: vps_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-jwt-secret}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER:-vps_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-vps_pass}
      MYSQL_DB: ${MYSQL_DB:-vps_dashboard}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      PROBE_TIMEOUT_S: "5"
      PROBE_CACHE_TTL: "15"
      TILE_CACHE_TTL: "86400"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:-}
      # 调度器与多 worker 注意事项：
      # 因使用 APScheduler，Workers 必须保持为 1，用 Threads 提升并发
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-1}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
    ports:
      # 仅绑定本地回环地址，防止 Flask API 直接对公网暴露（由 Nginx 反向代理）
      - "127.0.0.1:5000:5000"
    volumes:
      - /var/log/vps-dashboard:/var/log/vps-dashboard
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - vps-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # Nginx 反向代理
  nginx:
    # ✅ 改用 fholzer/nginx-brotli：内置 ngx_brotli 模块
    # 原 nginx:alpine 不含 brotli，无法使用 brotli_static / brotli on
    image: fholzer/nginx-brotli:latest
    container_name: vps_nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # ✅ 改为挂载 Vite 构建产物目录 frontend-dist/
      # 原来的 ../frontend/ 是未经构建的源码目录，已废弃
      - ../frontend-dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx-logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - vps-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    profiles:
      - production

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  vps-network:
    driver: bridge
