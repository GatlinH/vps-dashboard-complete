name: Frontend CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
    paths:
      - 'frontend-vite/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend-vite/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build:
    name: Frontend Build (path-filtered)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend-vite/package-lock.json

      - name: Install dependencies
        working-directory: frontend-vite
        run: npm ci

      - name: Build frontend
        working-directory: frontend-vite
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -f frontend-dist/index.html
          test -f frontend-dist/admin.html
          test -f frontend-dist/sw.js
          echo "✅ frontend-dist 构建产物完整"

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend-dist/
          retention-days: 7
          overwrite: true
