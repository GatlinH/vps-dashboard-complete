name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    secrets:
      inherit: true

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-flask

      - name: Run tests
        working-directory: backend
        env:
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key-32-characters!
          JWT_SECRET_KEY: ci-test-jwt-secret-key-32chars!!
          MYSQL_HOST: localhost
          MYSQL_PORT: 3306
          MYSQL_USER: vps_user
          MYSQL_PASSWORD: vps_pass
          MYSQL_DB: vps_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          FORCE_HTTPS: "0"
        run: pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-fail-under=30

  lint:
    name: Frontend Lint Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Check HTML syntax (DOCTYPE)
        run: |
          if grep -q '<<!DOCTYPE' frontend/index.html; then
            echo "❌ DOCTYPE 错误: 发现 '<<!DOCTYPE'"
            exit 1
          else
            echo "✅ DOCTYPE 正确"
          fi
      - name: Check script path
        run: |
          if grep -q '"/frontend/init-enhanced.js"' frontend/index.html; then
            echo "❌ 脚本路径错误: 应使用相对路径 ./init-enhanced.js"
            exit 1
          else
            echo "✅ 脚本路径正确"
          fi
      - name: Check i18n key completeness
        run: |
          python3 - <<'EOF'
          import re, sys

          with open('frontend/i18n.js', encoding='utf-8') as f:
              content = f.read()

          # Find all quoted keys in each top-level language block.
          # Strategy: find where each language object starts and extract keys line by line.
          key_re = re.compile(r"^\s+'([\w.]+)'\s*:", re.MULTILINE)
          # Find language markers like  'zh-CN': {
          lang_re = re.compile(r"'([\w-]+)'\s*:\s*\{")

          # Split content into segments between language markers
          splits = list(lang_re.finditer(content))
          lang_keys = {}
          for i, m in enumerate(splits):
              lang = m.group(1)
              start = m.end()
              end = splits[i + 1].start() if i + 1 < len(splits) else len(content)
              block = content[start:end]
              keys = set(key_re.findall(block))
              if keys:
                  lang_keys[lang] = keys

          if len(lang_keys) < 2:
              print(f"⚠️  Only {len(lang_keys)} language(s) found, skipping")
              sys.exit(0)

          all_keys = set().union(*lang_keys.values())
          has_missing = False
          for lang, keys in lang_keys.items():
              missing = all_keys - keys
              if missing:
                  print(f"❌ [{lang}] missing {len(missing)} key(s): {sorted(missing)}")
                  has_missing = True
              else:
                  print(f"✅ [{lang}] complete ({len(keys)} keys)")

          sys.exit(1 if has_missing else 0)
          EOF
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-vite/package.json
      - name: Install frontend deps
        working-directory: frontend-vite
        run: npm install
      - name: Build frontend
        working-directory: frontend-vite
        run: npm run build
