name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Backend lint (syntax)
        working-directory: backend
        run: python -m compileall -q .

      - name: Run tests
        working-directory: backend
        env:
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key-32-characters!
          JWT_SECRET_KEY: ci-test-jwt-secret-key-32chars!!
          MYSQL_HOST: localhost
          MYSQL_PORT: 3306
          MYSQL_USER: vps_user
          MYSQL_PASSWORD: vps_pass
          MYSQL_DB: vps_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_URL: redis://localhost:6379/0
          RATELIMIT_STORAGE_URI: memory://
          FORCE_HTTPS: "0"
        run: pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-fail-under=45

  frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Verify legacy frontend has been removed
        run: |
          if [ -d frontend ]; then
            echo "❌ 检测到遗留 frontend/ 目录，请改为 frontend-vite 构建产物部署"
            exit 1
          fi
          echo "✅ 已移除 legacy frontend/ 目录"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend-vite/package-lock.json

      - name: Install frontend deps
        working-directory: frontend-vite
        run: npm ci

      - name: Build frontend
        working-directory: frontend-vite
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -f frontend-dist/index.html
          test -f frontend-dist/admin.html
          test -f frontend-dist/sw.js
          echo "✅ frontend-dist 构建产物完整"

      - name: Upload frontend artifact
        if: github.event_name != 'workflow_call'
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend-dist/
          retention-days: 7
          overwrite: true
