name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  test:
    name: Backend Tests (gate)
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy:
    name: Deploy to VPS
    needs: test          # ← 测试失败则阻断部署
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH deploy to VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            echo "=== 开始部署 $(date) ==="

            cd /opt/vps-dashboard
            git pull origin main

            # 复制最新前端文件
            cp frontend/index.html /usr/share/nginx/html/index.html

            # 重启后端服务（仅重建有变更的镜像）
            cd backend
            docker compose up -d --build --remove-orphans

            # 健康检查轮询，最多等待 60 秒（12 × 5s）
            echo "等待服务健康检查..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:5000/health; then
                echo "✅ 服务已就绪"
                break
              fi
              echo "等待中... ($i/12)"
              sleep 5
              if [ $i -eq 12 ]; then
                echo "❌ 服务启动超时"
                docker compose logs api --tail=50
                exit 1
              fi
            done
            docker compose ps

            echo "=== 部署完成 $(date) ==="
