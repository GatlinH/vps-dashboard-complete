name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  test:
    name: Backend Tests (gate)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-flask

      - name: Run tests
        working-directory: backend
        env:
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key-32-characters!
          JWT_SECRET_KEY: ci-test-jwt-secret-key-32chars!!
          MYSQL_HOST: localhost
          MYSQL_PORT: 3306
          MYSQL_USER: vps_user
          MYSQL_PASSWORD: vps_pass
          MYSQL_DB: vps_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          FORCE_HTTPS: "0"
        run: pytest tests/ -v --tb=short

  deploy:
    name: Deploy to VPS
    needs: test          # ← 测试失败则阻断部署
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            echo "=== 开始部署 $(date) ==="

            cd /opt/vps-dashboard
            git pull origin main

            # 复制最新前端文件
            cp frontend/index.html /usr/share/nginx/html/index.html

            # 重启后端服务（仅重建有变更的镜像）
            cd backend
            docker compose up -d --build --remove-orphans

            # 等待健康检查
            echo "等待服务启动..."
            sleep 10
            docker compose ps

            echo "=== 部署完成 $(date) ==="
