name: Publish Native Agent Release
on:
  push:
    tags: ['agent-v*']
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example agent-v1.2.0)
        required: true
permissions:
  contents: write
jobs:
  linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: {python-version: '3.11'}
      - run: python -m pip install --upgrade pip pyinstaller psutil
      - run: pyinstaller --onefile --name vps-dashboard-agent-linux-amd64 --add-data 'scripts/agent_tasks.py:.' scripts/vps-agent.py
      - uses: actions/upload-artifact@v7
        with: {name: agent-linux-amd64, path: dist/vps-dashboard-agent-linux-amd64}
  linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-qemu-action@v4
      - uses: actions/checkout@v7
      - run: >-
          docker run --rm --platform linux/arm64 -v "$PWD:/src" -w /src python:3.11-slim
          sh -ec 'pip install --no-cache-dir pyinstaller psutil && pyinstaller --onefile --name vps-dashboard-agent-linux-arm64 --add-data scripts/agent_tasks.py:. scripts/vps-agent.py'
      - uses: actions/upload-artifact@v7
        with: {name: agent-linux-arm64, path: dist/vps-dashboard-agent-linux-arm64}
  windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: {python-version: '3.11'}
      - run: python -m pip install --upgrade pip pyinstaller -r scripts/windows/requirements-agent-windows.txt
      - run: pyinstaller --onefile --name vps-dashboard-agent-windows-amd64 --add-data "scripts/windows/agent_tasks.py;." scripts/vps-agent.py
      - uses: actions/upload-artifact@v7
        with: {name: agent-windows-amd64, path: dist/vps-dashboard-agent-windows-amd64.exe}
  release:
    needs: [linux-amd64, linux-arm64, windows-amd64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v7
        with: {path: release-assets, merge-multiple: true}
      - uses: actions/setup-python@v6
        with: {python-version: '3.11'}
      - run: python -m pip install cryptography
      - name: Sign manifest and hashes
        env:
          AGENT_RELEASE_ED25519_PRIVATE_KEY: ${{ secrets.AGENT_RELEASE_ED25519_PRIVATE_KEY }}
          VERSION: ${{ inputs.version || github.ref_name }}
        run: python scripts/release/build_manifest.py --version "$VERSION" --assets-dir release-assets
      - name: Verify signed manifest
        run: |
          python - <<'PY'
          import sys; sys.path.insert(0,'scripts/release')
          from sign_manifest import verify_manifest
          assert verify_manifest(open('release-assets/manifest.json').read(), open('release-assets/manifest.sig').read().strip(), open('release-assets/manifest.pub').read().strip())
          PY
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
