<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPS 星图 · 公开展示</title>
  <!--
    CSS 由 Vite 通过 main.js 的 import './styles/main.css' 注入，
    无需再写 <link rel="stylesheet"> —— 生产构建时自动提取为独立 CSS 文件。
  -->
</head>
<body>

<canvas id="starfield"></canvas>

<div id="app">
  <!-- NAV -->
  <nav>
    <div class="nav-logo">VPS<span>·</span>星图</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchPage('dashboard')">
        <span class="tab-icon">📡</span> 监控总览
      </button>
      <button class="nav-tab" onclick="switchPage('aff')">
        <span class="tab-icon">🛒</span> AFF市场
      </button>
      <button class="nav-tab" onclick="switchPage('globe')">
        <span class="tab-icon">🌍</span> 3D星图
      </button>
      <button class="nav-tab" onclick="switchPage('calc')">
        <span class="tab-icon">💹</span> 交易计算
      </button>
      <button class="nav-tab" onclick="switchPage('traffic')">
        <span class="tab-icon">📊</span> 流量统计
      </button>
    </div>
    <div class="nav-right">
      <div class="currency-switch">
        <button class="currency-btn active" onclick="setCurrency('CNY')">CNY</button>
        <button class="currency-btn" onclick="setCurrency('USD')">USD</button>
        <button class="currency-btn" onclick="setCurrency('EUR')">EUR</button>
      </div>
      <div class="rate-display" id="rateDisplay"></div>
      <a href="/admin.html"
         style="display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;
                background:var(--bg3);border:1px solid var(--border2);color:var(--text2);
                font-size:12px;cursor:pointer;transition:all .2s;font-family:var(--sans);text-decoration:none"
         onmouseover="this.style.color='var(--accent)'"
         onmouseout="this.style.color='var(--text2)'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        管理后台
      </a>
    </div>
  </nav>

  <!-- ===== DASHBOARD ===== -->
  <div id="page-dashboard" class="page active">
    <div class="page-title">服务器监控总览</div>
    <div class="stats-bar" id="statsBar"></div>
    <div class="toolbar">
      <div class="group-tabs" id="groupTabs"></div>
      <input class="search-box" id="searchBox" placeholder="搜索服务器、IP、位置..." oninput="filterServers()">
      <button class="add-btn" onclick="window.location.href='/admin.html'">+ 添加服务器</button>
    </div>
    <div class="server-grid" id="serverGrid"></div>
  </div>

  <!-- ===== AFF MARKET ===== -->
  <div id="page-aff" class="page">
    <div class="page-title">AFF推荐市场</div>
    <div class="aff-grid" id="affGrid"></div>
  </div>

  <!-- ===== GLOBE ===== -->
  <div id="page-globe" class="page">
    <div class="page-title">全球节点分布</div>

    <!-- Globe 控制栏 -->
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:1rem">
      <div style="display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px">
        <span style="font-size:11px;color:var(--text3)">连线显示</span>
        <label class="toggle-switch"><input type="checkbox" checked onchange="globeSetLines(this.checked)"><span class="toggle-slider"></span></label>
      </div>
      <div style="display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px">
        <span style="font-size:11px;color:var(--text3)">自动旋转</span>
        <label class="toggle-switch"><input type="checkbox" checked onchange="globeSetSpin(this.checked)"><span class="toggle-slider"></span></label>
      </div>
      <div style="display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px">
        <span style="font-size:11px;color:var(--text3)">国家轮廓</span>
        <label class="toggle-switch"><input type="checkbox" checked onchange="globeSetCountries(this.checked)"><span class="toggle-slider"></span></label>
      </div>
      <div style="display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px">
        <span style="font-size:11px;color:var(--text3)">卫星地图</span>
        <label class="toggle-switch"><input type="checkbox" onchange="globeSetTile(this.checked)"><span class="toggle-slider"></span></label>
      </div>
      <div style="display:flex;align-items:center;gap:0;background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden">
        <button onclick="adjustZoom(-0.2)" style="padding:5px 10px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:14px;border-right:1px solid var(--border)">−</button>
        <span id="zoomLabel" style="padding:4px 10px;font-size:11px;font-family:var(--mono);color:var(--text3);min-width:44px;text-align:center">1.00×</span>
        <button onclick="adjustZoom(+0.2)" style="padding:5px 10px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:14px;border-left:1px solid var(--border)">+</button>
      </div>
      <div style="display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px">
        <span style="font-size:11px;color:var(--text3)">定时抓取</span>
        <label class="toggle-switch"><input type="checkbox" id="toggleFetch" checked onchange="onFetchToggleChange(this.checked)"><span class="toggle-slider"></span></label>
      </div>
      <button onclick="manualGlobeFetch()" style="padding:5px 14px;border-radius:7px;background:var(--bg3);border:1px solid var(--border2);color:var(--accent);font-size:12px;cursor:pointer">↻ 立即刷新</button>
      <div class="spin" id="globeSpinner" style="display:none"></div>
      <span id="globeStatusText" style="font-size:11px;color:var(--text3)">等待初始化...</span>
    </div>

    <div id="globe-container">
      <canvas id="globe-canvas" width="860" height="520" style="cursor:grab;border-radius:16px;border:1px solid var(--border)"></canvas>
      <div class="globe-legend">
        <div style="font-size:11px;color:var(--text3);margin-bottom:8px;letter-spacing:1px">节点状态</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>在线</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>离线</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>预警</div>
        <div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px">
          <div class="legend-item"><div style="width:20px;height:2px;background:var(--accent);opacity:.6;border-radius:1px"></div>连接链路</div>
        </div>
      </div>
      <div class="globe-tooltip" id="globeTooltip"></div>
    </div>

    <div class="globe-info-panel" id="globeInfoPanel"></div>
  </div>

  <!-- ===== CALCULATOR ===== -->
  <div id="page-calc" class="page">
    <div class="page-title">交易计算器</div>
    <div class="calc-layout">
      <div class="calc-panel">
        <div class="calc-panel-title">📥 数据输入</div>
        <div class="tab-switch">
          <button class="tab-btn active" onclick="switchCalcTab('probe')">一键导入探针</button>
          <button class="tab-btn" onclick="switchCalcTab('manual')">手动输入</button>
        </div>
        <div id="calcTabProbe">
          <div class="scanning" id="scanStatus"><div class="spin"></div> 正在扫描服务器探针数据...</div>
          <div id="probeList"></div>
        </div>
        <div id="calcTabManual" style="display:none">
          <div class="form-row">
            <div class="form-group"><label class="form-label">服务器名称</label><input class="form-input" id="calcName" placeholder="my-vps-01"></div>
            <div class="form-group"><label class="form-label">位置</label><input class="form-input" id="calcLocation" placeholder="美国洛杉矶"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">CPU (核)</label><input class="form-input" id="calcCpu" type="number" placeholder="4"></div>
            <div class="form-group"><label class="form-label">内存 (GB)</label><input class="form-input" id="calcRam" type="number" placeholder="8"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">存储 (GB)</label><input class="form-input" id="calcDisk" type="number" placeholder="100"></div>
            <div class="form-group"><label class="form-label">带宽 (Mbps)</label><input class="form-input" id="calcBw" type="number" placeholder="1000"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">购入价格</label><input class="form-input" id="calcBuyPrice" type="number" placeholder="99"></div>
            <div class="form-group"><label class="form-label">购买周期</label>
              <select class="form-input" id="calcPeriod">
                <option value="12">年付</option><option value="1">月付</option>
                <option value="3">季付</option><option value="24">两年付</option>
              </select></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">购买日期</label><input class="form-input" id="calcBuyDate" type="date"></div>
            <div class="form-group"><label class="form-label">期望溢价 (%)</label><input class="form-input" id="calcPremium" type="number" placeholder="20"></div>
          </div>
          <button class="add-btn" style="width:100%;margin-top:8px" onclick="calculateFromManual()">计算</button>
        </div>
      </div>
      <div class="calc-panel">
        <div class="calc-panel-title">📊 计算结果</div>
        <div id="calcResults" style="color:var(--text3);font-size:13px;text-align:center;padding:3rem 0">请选择或输入服务器信息进行计算</div>
      </div>
    </div>
  </div>

  <!-- ===== TRAFFIC ===== -->
  <div id="page-traffic" class="page">
    <div class="page-title">流量统计与超限预警</div>
    <div class="stats-bar" id="trafficStatsBar"></div>
    <div class="toolbar" style="margin-bottom:1.25rem;flex-wrap:wrap">
      <div class="group-tabs" id="trafficGroupTabs"></div>
      <div style="display:flex;align-items:center;gap:10px;margin-left:auto;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--text3)">预警阈值</span>
        <select id="trafficAlertThreshold" class="search-box" style="width:88px;min-width:0;flex:none" onchange="renderTrafficPage()">
          <option value="70">70%</option><option value="80" selected>80%</option>
          <option value="90">90%</option><option value="95">95%</option>
        </select>
        <button class="add-btn" onclick="openTrafficSettings()">⚙ 流量配置</button>
      </div>
    </div>
    <div id="trafficAlertBanner" style="margin-bottom:1rem"></div>
    <div id="trafficGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:2rem"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:1.5rem" class="traffic-chart-row">
      <div class="calc-panel">
        <div class="calc-panel-title">📊 本月各服务器出入站流量</div>
        <div style="position:relative;height:240px;margin-top:10px"><canvas id="trafficBarChart"></canvas></div>
      </div>
      <div class="calc-panel">
        <div class="calc-panel-title" style="justify-content:space-between;flex-wrap:wrap;gap:8px">
          <span>📉 近30天流量趋势</span>
          <select id="trafficTrendServer" class="search-box" style="width:150px;min-width:0;flex:none;font-size:12px;padding:4px 8px" onchange="renderTrafficTrend()"></select>
        </div>
        <div style="position:relative;height:210px;margin-top:10px"><canvas id="trafficTrendChart"></canvas></div>
      </div>
    </div>
    <div class="calc-panel">
      <div class="calc-panel-title">📋 流量明细表</div>
      <div style="overflow-x:auto;margin-top:10px">
        <table id="trafficTable" style="width:100%;border-collapse:collapse;font-size:13px"></table>
      </div>
    </div>
  </div>
</div>

<!-- 流量配置弹窗 -->
<div class="modal-overlay" id="trafficSettingsModal"
     onclick="if(event.target.id==='trafficSettingsModal')document.getElementById('trafficSettingsModal').classList.remove('open')">
  <div class="modal" onclick="event.stopPropagation()" style="max-width:560px">
    <div class="modal-header">
      <div class="modal-title">⚙ 流量配置</div>
      <button class="modal-close" onclick="document.getElementById('trafficSettingsModal').classList.remove('open')">×</button>
    </div>
    <div id="trafficSettingsBody"></div>
  </div>
</div>

<!-- 服务器详情弹窗 -->
<div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">服务器详情</div>
      <button class="modal-close" onclick="document.getElementById('detailModal').classList.remove('open')">×</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<!--
  Vite 入口：所有 JS 与 CSS 由此注入。
  生产构建后此行被自动替换为带 hash 的 <script> + <link>。
-->
<script type="module" src="/src/main.js"></script>
</body>
</html>
