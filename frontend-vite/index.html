<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link id="dynamic-favicon" rel="icon" href="/api/v1/ops/settings/site/favicon">
  <title>VPS 星图展示</title>
  <meta name="color-scheme" content="dark light" />
  <style>
    html.detail-pending { background: #090d16; }
    .detail-pending #starfield, .detail-pending .display-shell { visibility: hidden; }
  </style>
  <script>
    if (new URLSearchParams(window.location.search).has('server')) {
      document.documentElement.classList.add('detail-pending');
    }
  </script>
  <script>
    window.__DBG__ = window.__DBG__ || {};
    if (window.__API_ROOT__ && !window.__DBG__.API_ROOT) {
      window.__DBG__.API_ROOT = window.__API_ROOT__;
      delete window.__API_ROOT__;
    }
  </script>
</head>
<body>
  <canvas id="starfield"></canvas>
  <div id="app" class="display-shell">
    <main class="display-main">
      <div id="pageRoot"></div>
    </main>
  </div>

  <script>
    (function () {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations?.().then(function (regs) {
          regs.forEach(function (reg) { reg.unregister(); });
        }).catch(function () {});
      }
      if (window.caches?.keys) {
        caches.keys().then(function (keys) {
          keys.filter(function (key) { return /workbox|precache|api-cache|runtime|external-cache|ipapi-cache/.test(key); })
            .forEach(function (key) { caches.delete(key); });
        }).catch(function () {});
      }
    })();
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
