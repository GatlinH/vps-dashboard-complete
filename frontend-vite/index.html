<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPS 星图 · 实时监控中心</title>
  
  <style>
    :root {
      /* 核心调色盘：深邃星空风格 */
      --bg-dark: #05070a;
      --bg-card: rgba(17, 25, 40, 0.75);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent: #4cc9f0;
      --accent-glow: rgba(76, 201, 240, 0.3);
      --text-bright: #f8fafc;
      --text-dim: #94a3b8;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* 全局样式 */
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      color: var(--text-bright);
      font-family: var(--sans);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* 背景画布置底层 */
    #starfield {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(circle at center, #111827 0%, #05070a 100%);
    }

    /* 顶部导航栏 - 毛玻璃效果 */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 70px;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
    }

    .nav-logo {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--accent);
    }

    .nav-logo span { color: var(--text-bright); }

    .nav-tabs {
      display: flex;
      gap: 8px;
      background: rgba(0, 0, 0, 0.2);
      padding: 4px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
    }

    .nav-tab {
      background: transparent;
      border: none;
      color: var(--text-dim);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-tab.active {
      background: var(--accent);
      color: #000;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    /* 货币切换按钮 */
    .currency-switch {
      display: flex;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--glass-border);
    }

    .currency-btn {
      background: transparent;
      border: none;
      color: var(--text-dim);
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .currency-btn.active {
      background: rgba(255, 255, 255, 0.15);
      color: var(--text-bright);
    }

    /* 主内容区布局 */
    main, .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px;
    }

    .page { display: none; animation: slideUp 0.5s ease-out; }
    .page.active { display: block; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-title {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 30px;
      background: linear-gradient(to right, #fff, var(--text-dim));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* 工具栏 & 搜索框 */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 25px;
    }

    .search-box {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 12px 20px;
      color: #fff;
      outline: none;
      transition: border-color 0.3s;
    }

    .search-box:focus { border-color: var(--accent); }

    .add-btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .add-btn:hover { transform: scale(1.02); }

    /* 服务器网格 */
    .server-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    /* 详情弹窗美化 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: none;
      place-items: center;
      z-index: 1000;
    }
    
    .modal-overlay.open { display: grid; }

    .modal {
      background: #111827;
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      width: 90%;
      max-width: 600px;
      padding: 30px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* 移动端适配 */
    @media (max-width: 768px) {
      nav { padding: 0 15px; flex-direction: column; height: auto; padding-bottom: 15px; }
      .nav-tabs { margin: 15px 0; width: 100%; overflow-x: auto; }
      .toolbar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>

<body>
  <canvas id="starfield"></canvas>

  <div id="app">
    <nav>
      <div class="nav-logo">VPS <span>·</span> 星图</div>
      
      <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchPage('dashboard')">
          <span class="tab-icon">📡</span> 监控总览
        </button>
        <button class="nav-tab" onclick="switchPage('aff')">
          <span class="tab-icon">🛒</span> AFF市场
        </button>
        <button class="nav-tab" onclick="switchPage('globe')">
          <span class="tab-icon">🌍</span> 3D星图
        </button>
        <button class="nav-tab" onclick="switchPage('calc')">
          <span class="tab-icon">💹</span> 交易计算
        </button>
        <button class="nav-tab" onclick="switchPage('traffic')">
          <span class="tab-icon">📊</span> 流量统计
        </button>
      </div>

      <div class="nav-right">
        <div class="currency-switch">
          <button class="currency-btn active" onclick="setCurrency('CNY')">CNY</button>
          <button class="currency-btn" onclick="setCurrency('USD')">USD</button>
          <button class="currency-btn" onclick="setCurrency('EUR')">EUR</button>
        </div>
        <div class="rate-display" id="rateDisplay"></div>
        <a href="/admin.html" class="add-btn" style="padding: 8px 16px; font-size: 13px; text-decoration: none;">
          ⚙ 管理后台
        </a>
      </div>
    </nav>

    <main>
      <div id="page-dashboard" class="page active">
        <div class="page-title">服务器监控总览</div>
        <div class="stats-bar" id="statsBar"></div>
        
        <div class="toolbar">
          <div class="group-tabs" id="groupTabs"></div>
          <input class="search-box" id="searchBox" placeholder="搜索服务器、IP、位置..." oninput="filterServers()">
          <button class="add-btn" onclick="window.location.href='/admin.html'">+ 添加服务器</button>
        </div>

        <div class="server-grid" id="serverGrid">
          </div>
      </div>

      <div id="page-aff" class="page">
        <div class="page-title">AFF推荐市场</div>
        <div class="toolbar" style="margin-bottom:2rem;flex-wrap:wrap">
          <div class="group-tabs" id="affGroupTabs"></div>
        </div>
        <div id="affContent"></div>
      </div>

      <div id="page-globe" class="page">
        <div class="page-title">3D 全球星图</div>
        <div id="globeContainer" style="height: 600px; background: rgba(0,0,0,0.3); border-radius: 20px;"></div>
      </div>

      <div id="page-calc" class="page">
        <div class="page-title">交易计算器</div>
        <div class="calc-layout" id="calcLayout"></div>
      </div>

      <div id="page-traffic" class="page">
        <div class="page-title">流量统计与预警</div>
        <div id="trafficGrid"></div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="detailModal" onclick="if(event.target === this) this.classList.remove('open')">
    <div class="modal">
      <div id="modalContent"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
