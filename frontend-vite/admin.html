<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link id="dynamic-favicon" rel="icon" href="/api/v1/ops/settings/site/favicon">
  <title>VPS星图·管理后台</title>
  <script>
    window.__DBG__ = window.__DBG__ || {};
  </script>
  
  <style>
    :root {
      /* 亮色模式变量 */
      --bg-base: #f4f7f9;
      --bg-panel: #ffffff;
      --primary: #4361ee;
      --primary-hover: #3a53d0;
      --text-main: #2b2d42;
      --text-muted: #8d99ae;
      --border: #eef2f6;
      --red: #ef233c;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    /* 自动适配暗色模式 */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-base: #0f172a;
        --bg-panel: #1e293b;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border: #334155;
        --shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      }
    }


    /* hotfix-admin-inline-bg-final-20260607 */
    html, body, body.komari-admin-shell, #admin-panel, .admin-body, .admin-nav {
      background-color: #eef2f6 !important;
      background-image: none !important;
    }

    /* 全局重置 */
    body {
      margin: 0;
      padding: 0;
      font-family: var(--sans);
      background-color: var(--bg-base);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    /* 主容器：改为水平 Flex 侧边栏布局 */
    #admin-panel {
      display: flex;
      flex-direction: row;
      min-height: 100vh;
    }

    /* 侧边导航栏 */
    .admin-nav {
      width: 260px;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow);
      z-index: 10;
      box-sizing: border-box;
    }

    .admin-nav-logo {
      font-size: 22px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-main);
      margin-bottom: 40px;
      padding-left: 8px;
      letter-spacing: -0.5px;
    }

    .admin-tabs {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* 导航按钮 */
    .admin-tab {
      background: transparent;
      border: none;
      padding: 14px 16px;
      border-radius: var(--radius);
      text-align: left;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--sans);
    }

    .admin-tab:hover {
      background: rgba(67, 97, 238, 0.08);
      color: var(--primary);
    }

    .admin-tab.active {
      background: var(--primary);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
    }

    /* 底部操作区 */
    .nav-actions {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-return {
      padding: 12px;
      border-radius: var(--radius);
      background: var(--bg-base);
      border: 1px solid var(--border);
      color: var(--text-main);
      font-size: 14px;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      font-weight: 500;
    }

    .btn-return:hover {
      background: var(--border);
    }

    .btn-logout {
      padding: 12px;
      border-radius: var(--radius);
      background: rgba(239, 35, 60, 0.1);
      border: 1px solid rgba(239, 35, 60, 0.2);
      color: var(--red);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--sans);
      display: flex;
      justify-content: center;
    }

    .btn-logout:hover {
      background: var(--red);
      color: #ffffff;
      border-color: var(--red);
    }

    /* 页面内容区 */
    .admin-body {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
      box-sizing: border-box;
    }

    .admin-page {
      display: none;
      animation: fadeIn 0.4s ease-out;
      background: var(--bg-panel);
      padding: 30px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      min-height: 100%;
      box-sizing: border-box;
    }

    .admin-page.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 移动端适配 */
    @media (max-width: 768px) {
      #admin-panel {
        flex-direction: column;
      }
      .admin-nav {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 20px;
      }
      .admin-nav-logo {
        margin-bottom: 20px;
      }
      .admin-tabs {
        flex-direction: row;
        overflow-x: auto;
        padding-bottom: 10px;
      }
      .admin-tab {
        white-space: nowrap;
      }
      .nav-actions {
        margin-top: 20px;
        flex-direction: row;
      }
      .btn-return, .btn-logout {
        flex: 1;
      }
      .admin-body {
        padding: 20px;
      }
    }

    /* hotfix-admin-inline-bg-last-20260607 */
    html, body, body.komari-admin-shell, body.komari-admin-shell #admin-panel,
    body.komari-admin-shell .admin-body, body.komari-admin-shell .admin-nav,
    body.komari-admin-shell .admin-page.active {
      background: #eef2f6 !important;
      background-color: #eef2f6 !important;
      background-image: none !important;
    }
  </style>
  
  <style id="admin-preboot-hide">body.admin-preboot #admin-panel{display:none!important;visibility:hidden!important}</style>
</head>

<body class="admin-preboot">
  <div id="login-mount"></div>

  <div id="admin-panel" style="display:none;">
    
    <div class="admin-nav">
      <div class="admin-topline">
        <button class="admin-menu-btn" type="button" aria-label="menu">☰</button>
      </div>
      
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="servers"><span class="nav-ico">▦</span><span data-i18n="servers">服务器</span></button>
        <button id="admin-settings-toggle" class="admin-tab has-children" data-tab="settings" type="button"><span class="nav-ico">⚙</span><span data-i18n="settings">设置</span><b class="settings-caret">⌄</b></button>
        <div id="admin-settings-subtabs" class="admin-subtabs" aria-label="设置子菜单">
          <button class="admin-subtab" data-settings-section="site"><span class="nav-ico">⌂</span> <span data-i18n="site">站点</span></button>
          <button class="admin-subtab" data-settings-section="login"><span class="nav-ico">↪</span> <span data-i18n="login">登录</span></button>
          <button class="admin-subtab" data-settings-section="notify"><span class="nav-ico">🔔</span> <span data-i18n="notify">通知</span></button>
          <button class="admin-subtab" data-settings-section="general"><span class="nav-ico">⋯</span> <span data-i18n="general">通用</span></button>
          <button class="admin-subtab" data-settings-section="proxy"><span class="nav-ico">⇄</span> <span data-i18n="proxy">反向代理</span></button>
        </div>
        <button class="admin-tab" data-tab="alerts"><span class="nav-ico">🔔</span><span data-i18n="alert_rules">通知规则</span></button>
        <button class="admin-tab" data-tab="network"><span class="nav-ico">⌁</span><span data-i18n="latency_monitor">延迟监测</span></button>
        <button class="admin-tab" data-tab="users"><span class="nav-ico">☷</span><span data-i18n="sessions">会话管理</span></button>
        <button class="admin-tab" data-tab="account"><span class="nav-ico">👤</span><span data-i18n="account">账户</span></button>
        <button class="admin-tab" data-tab="ops"><span class="nav-ico">☰</span><span data-i18n="logs">日志</span></button>
        <button class="admin-tab" data-tab="theme"><span class="nav-ico">◐</span><span data-i18n="theme_management">默认主题管理</span></button>
      </div>

      <div class="nav-actions">
        <a href="/" class="btn-return" data-i18n="return_starmap">返回星图</a>
        <button class="btn-logout" data-i18n="logout">退出登录</button>
      </div>
    </div>

    <div class="admin-body"><div class="admin-toolbar"><button id="admin-theme-toggle" class="admin-toolbar-btn" type="button">舰桥</button><select id="admin-lang-select" class="admin-toolbar-select"><option value="zh">中文</option><option value="en">English</option><option value="ja">日本語</option><option value="ko">한국어</option><option value="fr">Français</option><option value="de">Deutsch</option><option value="es">Español</option><option value="ru">Русский</option></select></div>
      <div id="tab-servers" class="admin-page active"></div>
      <div id="tab-network" class="admin-page"></div>
      <div id="tab-alerts" class="admin-page"></div>
      <div id="tab-theme" class="admin-page"></div>
      <div id="tab-account" class="admin-page"></div>
      <div id="tab-users" class="admin-page"></div>
      <div id="tab-settings" class="admin-page"></div>
      <div id="tab-ops" class="admin-page"></div>
    </div>
    
  </div>

  <script type="module" src="/src/admin-main.js"></script>
</body>
</html>
