# Docker image deployment override for VPS.
# Usage on the VPS:
#   docker compose -f docker-compose.yml -f docker-compose.ghcr.yml pull
#   docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d --no-build
#
# Watchtower will keep frontend/api/agent_consumer updated from GHCR without GitHub Actions SSH.

services:
  api:
    image: ghcr.io/gatlinh/vps-dashboard-complete-backend:latest
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  agent_consumer:
    image: ghcr.io/gatlinh/vps-dashboard-complete-backend:latest
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  frontend:
    image: ghcr.io/gatlinh/vps-dashboard-complete-frontend:latest
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: vps_watchtower
    restart: unless-stopped
    command:
      - --label-enable
      - --cleanup
      - --interval
      - "300"
      - --rolling-restart
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - vps-network
