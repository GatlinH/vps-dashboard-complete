version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test_db
    ports:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7
    ports:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgres://test:test@db:5432/test_db
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: '1'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: bash -lc "python -m pip install --upgrade pip && pip install -r requirements.txt && pytest --maxfail=1 -q"