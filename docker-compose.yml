version: "3.9"

services:
  mysql:
    image: mysql:8.0.33
    container_name: vps_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max-connections=1000
      --max_allowed_packet=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - vps-network

  redis:
    image: redis:7-alpine
    container_name: vps_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    environment:
      # REDISCLI_AUTH lets redis-cli authenticate automatically in healthcheck
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - vps-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vps_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DB: ${MYSQL_DB}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      CORS_ORIGINS: ${CORS_ORIGINS}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_TOKEN_SECRET: ${TELEGRAM_TOKEN_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL}
      PROBE_TIMEOUT_S: ${PROBE_TIMEOUT_S:-5}
      PROBE_CACHE_TTL: ${PROBE_CACHE_TTL:-15}
      TILE_CACHE_TTL: ${TILE_CACHE_TTL:-86400}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-1}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      AGENT_REQUIRE_TLS: ${AGENT_REQUIRE_TLS:-1}
      AGENT_PUSH_RATE_LIMIT: ${AGENT_PUSH_RATE_LIMIT:-60 per minute}
      AGENT_POLL_RATE_LIMIT: ${AGENT_POLL_RATE_LIMIT:-120 per minute}
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - /var/log/vps-dashboard:/var/log/vps-dashboard
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - vps-network

  agent_consumer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vps_agent_consumer
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["python", "-m", "workers.agent_consumer"]
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DB: ${MYSQL_DB}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      CORS_ORIGINS: ${CORS_ORIGINS}
      AGENT_METRICS_QUEUE_TIMEOUT: ${AGENT_METRICS_QUEUE_TIMEOUT:-5}
      AGENT_METRICS_RETRY_SLEEP: ${AGENT_METRICS_RETRY_SLEEP:-1}
      AGENT_METRICS_ERROR_QUEUE: ${AGENT_METRICS_ERROR_QUEUE:-vps:agent:metrics_queue:error}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY}
    volumes:
      - /var/log/vps-dashboard:/var/log/vps-dashboard
    networks:
      - vps-network

  nginx:
    image: fholzer/nginx-brotli:latest
    container_name: vps_nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend/nginx-main.conf:/etc/nginx/nginx.conf:ro
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/admin-allowlist.conf:/etc/nginx/conf.d/admin-allowlist.conf:ro
      - ./frontend-dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx-logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - vps-network
    profiles:
      - production

volumes:
  mysql_data:
  redis_data:

networks:
  vps-network:
    driver: bridge
