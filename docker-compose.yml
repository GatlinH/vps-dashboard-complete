#version: "3.9"

services:
  mysql:
    image: mysql:8.0.33
    container_name: vps_mysql
    restart: unless-stopped
    env_file:
      - /etc/vps-dashboard/secrets.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
      MYSQL_DATABASE: ${MYSQL_DB:-vps_dashboard}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max-connections=1000
      --max_allowed_packet=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 5s
      retries: 10
    networks:
      - vps-network

  schema_init:
    image: ghcr.io/gatlinh/vps-dashboard-complete-backend:latest
    container_name: vps_schema_init
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - /etc/vps-dashboard/secrets.env
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: "0"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      FORCE_HTTPS: ${FORCE_HTTPS:-0}
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:-0}
      DISABLE_SCHEDULER: "1"
    command:
      - sh
      - -lc
      - python -c "from app import create_app; from extensions import db; app=create_app(); ctx=app.app_context(); ctx.push(); db.create_all(); ctx.pop(); print('schema_init_ok')"
    networks:
      - vps-network

  redis:
    image: redis:7-alpine
    container_name: vps_redis
    restart: unless-stopped
    command:
      - sh
      - -c
      - >
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --requirepass "$$REDIS_PASSWORD" --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec;
        else
          exec redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec;
        fi
    env_file:
      - /etc/vps-dashboard/secrets.env
    environment:
      # REDISCLI_AUTH lets redis-cli authenticate automatically in healthcheck
      REDISCLI_AUTH: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5
    networks:
      - vps-network

  api:
    image: ghcr.io/gatlinh/vps-dashboard-complete-backend:latest
    container_name: vps_api
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    depends_on:
      schema_init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - /etc/vps-dashboard/secrets.env
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: "0"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      # Telegram secrets are loaded from /etc/vps-dashboard/secrets.env via env_file.
      # Do not redeclare them here with ${VAR:-}; compose interpolation would override env_file with blank values.
      PROBE_TIMEOUT_S: ${PROBE_TIMEOUT_S:-5}
      PROBE_CACHE_TTL: ${PROBE_CACHE_TTL:-15}
      # Empty by default: fresh installs should not ping external preset targets unless explicitly configured.
      PING_TARGETS_JSON: ${PING_TARGETS_JSON:-}
      TILE_CACHE_TTL: ${TILE_CACHE_TTL:-86400}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-1}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      FORCE_HTTPS: ${FORCE_HTTPS:-0}
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:-0}
      JWT_BLOCKLIST_FAIL_OPEN: ${JWT_BLOCKLIST_FAIL_OPEN:-0}
      JWT_COOKIE_SAMESITE: ${JWT_COOKIE_SAMESITE:-Lax}
      ADMIN_SETTINGS_FILE: ${ADMIN_SETTINGS_FILE:-/var/lib/vps-dashboard/admin-settings.json}
      BREAKGLASS_USERNAMES: ${BREAKGLASS_USERNAMES:-}
      PUBLIC_OAUTH_PROVIDER_DISCOVERY: ${PUBLIC_OAUTH_PROVIDER_DISCOVERY:-0}
      AGENT_REQUIRE_TLS: ${AGENT_REQUIRE_TLS:-1}
      AGENT_PUSH_RATE_LIMIT: ${AGENT_PUSH_RATE_LIMIT:-60 per minute}
      AGENT_POLL_RATE_LIMIT: ${AGENT_POLL_RATE_LIMIT:-120 per minute}
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_HTTP_API_TOKEN:-}
      WATCHTOWER_HTTP_API_URL: http://watchtower:8080/v1/update
    ports:
      - "0.0.0.0:4500:5000"
    volumes:
      - /var/log/vps-dashboard:/var/log/vps-dashboard
      - /var/lib/vps-dashboard:/var/lib/vps-dashboard
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests,sys; r=requests.get('http://localhost:5000/health',timeout=5,allow_redirects=False); sys.exit(0 if r.status_code in (200,302,503) else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - vps-network

  agent_consumer:
    image: ghcr.io/gatlinh/vps-dashboard-complete-backend:latest
    container_name: vps_agent_consumer
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,sys; sys.exit(0 if os.path.exists('/proc/1') else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["python", "-m", "workers.agent_consumer"]
    env_file:
      - /etc/vps-dashboard/secrets.env
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: "0"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      AGENT_METRICS_QUEUE_TIMEOUT: ${AGENT_METRICS_QUEUE_TIMEOUT:-5}
      AGENT_METRICS_RETRY_SLEEP: ${AGENT_METRICS_RETRY_SLEEP:-1}
      AGENT_METRICS_ERROR_QUEUE: ${AGENT_METRICS_ERROR_QUEUE:-vps:agent:metrics_queue:error}
    volumes:
      - /var/log/vps-dashboard:/var/log/vps-dashboard
    networks:
      - vps-network

  watchtower:
    image: containrrr/watchtower:latest
    container_name: vps_watchtower
    restart: unless-stopped
    command:
      - --label-enable
      - --cleanup
      - --rolling-restart
      - --http-api-update
    environment:
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_HTTP_API_TOKEN:?set WATCHTOWER_HTTP_API_TOKEN}
      DOCKER_API_VERSION: "1.44"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - vps-network


volumes:
  mysql_data:
  redis_data:

networks:
  vps-network:
    driver: bridge
